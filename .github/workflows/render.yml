name: Render Export Job

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Supabase jobs.id to render'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      # Fixed: Added working-directory so it finds package.json
      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      # Fixed: Added working-directory so it can locate remotion binaries
      - name: Install Chrome for Remotion
        working-directory: ./server
        run: npx remotion browser ensure

      - name: Render and upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          # If you don't use a preset, you can pass your API Secret key here instead:
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        working-directory: ./server
        run: npx ts-node src/scripts/renderJob.ts "${{ inputs.job_id }}"