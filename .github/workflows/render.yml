name: Render Export Job

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Supabase jobs.id to render'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22   
          cache: npm
          # Pointing to the root lockfile now
          cache-dependency-path: package-lock.json

      # CLEANEST: Install everything at the root once
      - name: Install All Monorepo Dependencies
        run: npm ci

      # Executed from root because that's where node_modules/.bin lives
      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Render and upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        working-directory: ./server
        run: npx ts-node src/scripts/renderJob.ts "${{ inputs.job_id }}"