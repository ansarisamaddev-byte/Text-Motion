name: Render Export Job

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Supabase jobs.id to render'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22   
          cache: npm
          # Enhanced cache tracking to follow both project directories
          cache-dependency-path: |
            server/package-lock.json
            frontend/package-lock.json

      - name: Install Server dependencies
        working-directory: ./server
        run: npm ci

      - name: Install Frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # FIXED: Swapped 'npm exec' for direct binary path execution to fix executable errors
      - name: Install Chrome for Remotion
        working-directory: ./server
        run: ./node_modules/.bin/remotion browser ensure

      - name: Render and upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        working-directory: ./server
        run: npx ts-node src/scripts/renderJob.ts "${{ inputs.job_id }}"